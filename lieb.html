<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Han dich Lieb ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fff0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
  }

  /* ── BIG HEART ── */
  .heart-bg {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 0;
  }

  .heart-bg svg {
    width: min(95vw, 95vh);
    height: min(95vw, 95vh);
    filter: drop-shadow(0 0 60px rgba(220,30,60,0.35));
    animation: heartbeat 2.4s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14%      { transform: scale(1.06); }
    28%      { transform: scale(1); }
    42%      { transform: scale(1.04); }
    56%      { transform: scale(1); }
  }

  /* ── PHOTOS ── */
  .photos {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .photo {
    position: absolute;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(180,0,30,0.35);
    border: 3px solid rgba(255,255,255,0.85);
    pointer-events: all;
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
  }

  .photo:hover {
    transform: scale(1.1) rotate(0deg) !important;
    box-shadow: 0 16px 48px rgba(180,0,30,0.55);
    z-index: 10;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* positions inside the heart shape */
  .photo-1 { width: 155px; height: 155px; top: 17%; left: 18%;    transform: rotate(-6deg);  animation-delay: 0.1s; }
  .photo-2 { width: 155px; height: 155px; top: 17%; right: 18%;   transform: rotate(5deg);   animation-delay: 0.3s; }
  .photo-3 { width: 155px; height: 155px; bottom: 22%; left: 22%; transform: rotate(7deg);   animation-delay: 0.5s; }
  .photo-4 { width: 155px; height: 155px; bottom: 22%; right: 22%; transform: rotate(-5deg); animation-delay: 0.7s; }


  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.6) rotate(0deg); }
    to   { opacity: 1; }
  }

  /* ── TEXT ── */
  .content {
    position: relative;
    z-index: 5;
    text-align: center;
    pointer-events: none;
    animation: slideUp 1.4s ease 0.5s forwards;
    opacity: 0;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .main-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: clamp(2.8rem, 9vw, 6rem);
    color: #fff;
    text-shadow:
      0 2px 8px rgba(180,0,30,0.7),
      0 0 40px rgba(255,80,100,0.5);
    line-height: 1.15;
    letter-spacing: 1px;
  }

  .sub-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 400;
    font-size: clamp(1.1rem, 3vw, 1.7rem);
    color: rgba(255,255,255,0.97);
    text-shadow: 0 2px 10px rgba(180,0,30,0.6);
    margin-top: 0.8rem;
    line-height: 1.6;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── FLOATING HEARTS ── */
  .sparkles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }

  .spark {
    position: absolute;
    font-size: 1.4rem;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.5); opacity: 0; }
    10%  { opacity: 0.9; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-100vh) scale(1.1); opacity: 0; }
  }
</style>
</head>
<body>

<!-- BIG HEART SVG -->
<div class="heart-bg">
  <svg viewBox="0 0 200 185" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="hg" cx="50%" cy="40%" r="60%">
        <stop offset="0%"   stop-color="#ff4060"/>
        <stop offset="60%"  stop-color="#e0102e"/>
        <stop offset="100%" stop-color="#9b0020"/>
      </radialGradient>
    </defs>
    <!-- heart path -->
    <path d="M100 170
             C 50 140, 10 110, 10 65
             C 10 30, 40 10, 70 10
             C 83 10, 93 16, 100 25
             C 107 16, 117 10, 130 10
             C 160 10, 190 30, 190 65
             C 190 110, 150 140, 100 170Z"
          fill="url(#hg)"/>
  </svg>
</div>

<!-- PHOTOS -->
<div class="photos">
  <div class="photo photo-1"><img src="1.jpeg" alt="Foto 1"></div>
  <div class="photo photo-2"><img src="2.jpeg" alt="Foto 2"></div>
  <div class="photo photo-3"><img src="3.jpeg" alt="Foto 3"></div>
  <div class="photo photo-4"><img src="4.jpeg" alt="Foto 4"></div>
</div>

<!-- FLOATING HEARTS -->
<div class="sparkles" id="sparkles"></div>

<!-- TEXT -->
<div class="content">
  <div class="main-title">Han dich Lieb ❤️</div>
  <div class="sub-text">
    Ich wünsch der en Schöne Namittag und<br>
    freu mich dich am Friitig zgseh!
  </div>
</div>

<script>
  // Floating tiny hearts
  const sparkles = document.getElementById('sparkles');
  const hearts = ['❤️','🩷','💕','💖','💗'];

  function addSpark() {
    const el = document.createElement('span');
    el.className = 'spark';
    el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.bottom = '-2rem';
    const dur = 4 + Math.random() * 5;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = Math.random() * 2 + 's';
    el.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    sparkles.appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
  }

  setInterval(addSpark, 500);
  for(let i = 0; i < 8; i++) setTimeout(addSpark, i * 200);
</script>
</body>
</html>
